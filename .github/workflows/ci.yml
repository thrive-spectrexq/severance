name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Enable vcpkg binary caching via GitHub Actions cache
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgJsonGlob: 'vcpkg.json'

    - name: Configure CMake
      run: >
        cmake -B build -S . 
        -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" 
        -DCMAKE_BUILD_TYPE=Release

    - name: Build Application
      run: cmake --build build --config Release

    - name: Run Tests
      shell: pwsh
      run: |
        cd build
        ctest -C Release --output-on-failure --timeout 60

    - name: Verify Plugin DLLs
      shell: pwsh
      run: |
        $ExpectedPlugins = @("sample_plugin.dll", "sample_c_plugin.dll", "security_plugin.dll")
        $AllFound = $true
        
        foreach ($Plugin in $ExpectedPlugins) {
          $Found = Get-ChildItem -Path build -Recurse -Filter $Plugin -ErrorAction SilentlyContinue
          if ($Found) {
            Write-Host "✓ $Plugin found at: $($Found.FullName)"
          } else {
            Write-Host "✗ $Plugin not found in build tree"
            $AllFound = $false
          }
        }
        
        if (-not $AllFound) {
          Write-Host "::warning::Some plugin DLLs were not found"
        }

    - name: Deploy Qt Dependencies (windeployqt)
      shell: pwsh
      run: |
        $QtBinPath = "${{ github.workspace }}\vcpkg\installed\x64-windows\tools\qt6\bin"
        $QtPluginPath = "${{ github.workspace }}\vcpkg\installed\x64-windows\plugins"
        $WindeployqtPath = "$QtBinPath\windeployqt.exe"
        if (Test-Path $WindeployqtPath) {
          Write-Host "Running windeployqt..."
          $env:QT_PLUGIN_PATH = $QtPluginPath
          & $WindeployqtPath --release --compiler-runtime --plugindir build\Release\plugins_qt build\Release\severance.exe
          Write-Host "windeployqt completed"
        } else {
          Write-Host "Warning: windeployqt not found, manually copying platform plugin..."
        }
        
        # Ensure the platforms directory exists with qwindows.dll
        if (-not (Test-Path "build\Release\platforms\qwindows.dll") -and -not (Test-Path "build\Release\plugins_qt\platforms\qwindows.dll")) {
          Write-Host "Platform plugin not deployed by windeployqt, copying manually..."
          $QWindowsDll = Get-ChildItem "${{ github.workspace }}\vcpkg\installed\x64-windows" -Recurse -Filter "qwindows.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($QWindowsDll) {
            New-Item -ItemType Directory -Force -Path "build\Release\platforms"
            Copy-Item $QWindowsDll.FullName "build\Release\platforms\" -Force
            Write-Host "Copied qwindows.dll from: $($QWindowsDll.FullName)"
          } else {
            Write-Host "::warning::qwindows.dll not found in vcpkg installation"
          }
        }
        
    - name: Prepare Artifact Folder
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist
        New-Item -ItemType Directory -Force -Path dist\plugins
        New-Item -ItemType Directory -Force -Path dist\platforms
        
        # Copy the main application and all dependencies
        Copy-Item -Path build\Release\* -Destination dist\ -Recurse -Force
        
        # If windeployqt used a custom plugindir, move platform plugins to standard location
        if (Test-Path "dist\plugins_qt\platforms\qwindows.dll") {
          Copy-Item -Path "dist\plugins_qt\platforms\*" -Destination "dist\platforms\" -Force
        }
        
        # Verify platforms directory
        if (Test-Path "dist\platforms\qwindows.dll") {
          Write-Host "✓ qwindows.dll found in dist\platforms\"
        } else {
          Write-Host "::warning::qwindows.dll is missing from the artifact!"
        }
        
        # Copy severance plugin DLLs
        Get-ChildItem -Path build -Recurse -Filter "*.dll" | Where-Object {
          $_.DirectoryName -match "plugins[/\\](sample_|security_)" -or
          ($_.DirectoryName -match "plugins[/\\]Release" -and $_.Name -match "(sample_|security_)")
        } | ForEach-Object {
          Copy-Item -Path $_.FullName -Destination dist\plugins\ -Force
          Write-Host "Copied plugin: $($_.Name)"
        }
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: severance-windows-x64
        path: dist\
        retention-days: 14
