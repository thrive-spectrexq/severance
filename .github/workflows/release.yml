name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g., v1.0.0, v0.2.0-dev

env:
  # Enable vcpkg binary caching via GitHub Actions cache
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_BASELINE: "46c9f8d8398360278222d335c28bceb776ebb61f"

jobs:
  release-windows:
    name: Build Windows Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    # ── sccache (C/C++ compilation cache) ──────────────────────────
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.7

    # ── vcpkg (dependency cache) ───────────────────────────────────
    - name: Cache vcpkg installed packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/vcpkg/installed
          ${{ github.workspace }}/vcpkg/packages
        key: vcpkg-win-x64-${{ env.VCPKG_BASELINE }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-win-x64-${{ env.VCPKG_BASELINE }}-
          vcpkg-win-x64-

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgJsonGlob: 'vcpkg.json'

    # ── Build ──────────────────────────────────────────────────────
    - name: Configure CMake
      run: >
        cmake -B build -S . 
        -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" 
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_C_COMPILER_LAUNCHER=sccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build Application
      run: cmake --build build --config Release

    # ── Deploy Qt runtime dependencies ─────────────────────────────
    - name: Deploy Qt Dependencies (windeployqt)
      shell: pwsh
      run: |
        $VcpkgRoot = "${{ github.workspace }}\vcpkg"
        $InstalledDir = "$VcpkgRoot\installed\x64-windows"

        $WindeployqtExe = Get-ChildItem "$InstalledDir\tools" -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
        
        if ($WindeployqtExe) {
          Write-Host "Found windeployqt at: $($WindeployqtExe.FullName)"
          $env:PATH = "$($WindeployqtExe.DirectoryName);$InstalledDir\bin;$env:PATH"
          & $WindeployqtExe.FullName --release --no-compiler-runtime build\Release\severance.exe 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host "windeployqt completed"
        } else {
          Write-Host "::warning::windeployqt not found — will do manual Qt plugin deployment"
        }

    - name: Prepare Artifact Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist | Out-Null
        New-Item -ItemType Directory -Force -Path dist\plugins | Out-Null
        New-Item -ItemType Directory -Force -Path dist\platforms | Out-Null
        New-Item -ItemType Directory -Force -Path dist\styles | Out-Null
        New-Item -ItemType Directory -Force -Path dist\sqldrivers | Out-Null

        # Copy the main application and Qt dependencies
        Copy-Item -Path build\Release\* -Destination dist\ -Recurse -Force

        # ── Ensure qwindows.dll is in dist\platforms ──
        $VcpkgRoot = "${{ github.workspace }}\vcpkg"
        $QWindowsDll = $null

        $CandidatePaths = @(
          "dist\platforms\qwindows.dll",
          "build\Release\platforms\qwindows.dll",
          "build\Release\plugins\platforms\qwindows.dll"
        )
        foreach ($path in $CandidatePaths) {
          if (Test-Path $path) {
            $QWindowsDll = Get-Item $path
            Write-Host "Found qwindows.dll at expected path: $path"
            break
          }
        }

        if (-not $QWindowsDll) {
          Write-Host "Searching vcpkg tree for qwindows.dll..."
          $QWindowsDll = Get-ChildItem "$VcpkgRoot\installed" -Recurse -Filter "qwindows.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($QWindowsDll) {
            Write-Host "Found qwindows.dll in vcpkg: $($QWindowsDll.FullName)"
          }
        }

        if (-not $QWindowsDll) {
          Write-Host "Searching build tree for qwindows.dll..."
          $QWindowsDll = Get-ChildItem "build" -Recurse -Filter "qwindows.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($QWindowsDll) {
            Write-Host "Found qwindows.dll in build: $($QWindowsDll.FullName)"
          }
        }

        if ($QWindowsDll) {
          Copy-Item $QWindowsDll.FullName "dist\platforms\" -Force
          Write-Host "✓ qwindows.dll copied to dist\platforms\"
        } else {
          Write-Host "::error::qwindows.dll not found anywhere — release artifact will be broken!"
          exit 1
        }

        # ── Copy styles plugin ──
        $QWindowsStyleDll = Get-ChildItem "$VcpkgRoot\installed" -Recurse -Filter "qmodernwindowsstyle.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $QWindowsStyleDll) {
          $QWindowsStyleDll = Get-ChildItem "$VcpkgRoot\installed" -Recurse -Filter "qwindowsvistastyle.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if ($QWindowsStyleDll) {
          Copy-Item $QWindowsStyleDll.FullName "dist\styles\" -Force
          Write-Host "✓ Style plugin copied: $($QWindowsStyleDll.Name)"
        }

        # ── Copy SQL driver plugin (SQLite) ──
        New-Item -ItemType Directory -Force -Path "dist\sqldrivers" | Out-Null
        $QSqliteDll = $null
        $SqlCandidates = @(
          "dist\sqldrivers\qsqlite.dll",
          "build\Release\sqldrivers\qsqlite.dll",
          "build\Release\plugins\sqldrivers\qsqlite.dll"
        )
        foreach ($path in $SqlCandidates) {
          if (Test-Path $path) {
            $QSqliteDll = Get-Item $path
            break
          }
        }
        if (-not $QSqliteDll) {
          $QSqliteDll = Get-ChildItem "$VcpkgRoot\installed" -Recurse -Filter "qsqlite.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if (-not $QSqliteDll) {
          $QSqliteDll = Get-ChildItem "build" -Recurse -Filter "qsqlite.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if ($QSqliteDll) {
          Copy-Item $QSqliteDll.FullName "dist\sqldrivers\" -Force
          Write-Host "✓ qsqlite.dll copied to dist\sqldrivers\"
        } else {
          Write-Host "::warning::qsqlite.dll not found — SQLite database will not work"
        }

        # ── Copy severance plugin DLLs ──
        Get-ChildItem -Path build -Recurse -Filter "*.dll" | Where-Object {
          $_.DirectoryName -match "plugins"
        } | ForEach-Object {
          Copy-Item -Path $_.FullName -Destination dist\plugins\ -Force
          Write-Host "Copied plugin: $($_.Name)"
        }

        # ── Final verification ──
        if (-not (Test-Path "dist\platforms\qwindows.dll")) {
          Write-Host "::error::qwindows.dll missing from final dist — aborting"
          exit 1
        }

        Compress-Archive -Path dist\* -DestinationPath severance-windows-x64.zip

    # ── Build Windows Installer ────────────────────────────────────
    - name: Build Installer (Inno Setup)
      shell: pwsh
      run: |
        $IsccPaths = @(
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
          "C:\Program Files\Inno Setup 6\ISCC.exe"
        )
        $Iscc = $null
        foreach ($path in $IsccPaths) {
          if (Test-Path $path) {
            $Iscc = $path
            break
          }
        }
        
        if (-not $Iscc) {
          Write-Host "::warning::Inno Setup not found — skipping installer build"
          exit 0
        }
        
        Write-Host "Building installer with: $Iscc"
        & $Iscc installer\severance-installer.iss
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "::error::Installer build failed"
          exit 1
        }
        
        Write-Host "✓ Installer built successfully"
        Get-ChildItem dist-installer\

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          severance-windows-x64.zip
          dist-installer/*.exe
        generate_release_notes: true
