name: Static Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-binary-cache
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-binary-cache,readwrite"
  VCPKG_BASELINE: "46c9f8d8398360278222d335c28bceb776ebb61f"

jobs:
  clang-tidy:
    name: Clang-Tidy Analysis
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create vcpkg cache directories
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/vcpkg-binary-cache" | Out-Null

    # ── vcpkg (dependency cache) ───────────────────────────────────
    - name: Cache vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-binary-cache
        key: vcpkg-bins-win-x64-${{ env.VCPKG_BASELINE }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-bins-win-x64-${{ env.VCPKG_BASELINE }}-
          vcpkg-bins-win-x64-

    - name: Cache vcpkg downloads
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg/downloads
        key: vcpkg-dl-win-x64-${{ env.VCPKG_BASELINE }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-dl-win-x64-${{ env.VCPKG_BASELINE }}-
          vcpkg-dl-win-x64-

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgJsonGlob: 'vcpkg.json'

    - name: Configure CMake (compile_commands.json)
      run: >
        cmake -B build -S . 
        -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" 
        -DCMAKE_BUILD_TYPE=Release 
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run clang-tidy
      shell: pwsh
      run: |
        # Find clang-tidy from Visual Studio installation (prefer x64 over ARM64)
        $AllClangTidy = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "clang-tidy.exe" -ErrorAction SilentlyContinue
        $ClangTidy = $AllClangTidy | Where-Object { $_.FullName -match "x64" -or $_.FullName -match "X64" } | Select-Object -First 1
        if (-not $ClangTidy) {
          # Fall back to any non-ARM64 binary
          $ClangTidy = $AllClangTidy | Where-Object { $_.FullName -notmatch "ARM64" -and $_.FullName -notmatch "arm64" } | Select-Object -First 1
        }
        
        if (-not $ClangTidy) {
          Write-Host "::warning::clang-tidy (x64) not found, skipping analysis"
          exit 0
        }

        Write-Host "Found clang-tidy at: $($ClangTidy.FullName)"
        
        # Gather source files (skip platform-specific C files and generated files)
        $SourceFiles = Get-ChildItem -Path src -Recurse -Include "*.cpp" | 
          Where-Object { $_.FullName -notmatch "platform[/\\]windows" } |
          Select-Object -ExpandProperty FullName

        $ErrorCount = 0
        foreach ($File in $SourceFiles) {
          Write-Host "Analyzing: $File"
          $output = & $ClangTidy.FullName $File -p build --quiet 2>&1
          foreach ($line in $output) {
            $lineStr = $line.ToString()
            # Skip "no checks enabled" meta-errors — these are config issues, not code issues
            if ($lineStr -match "no checks enabled") { continue }
            if ($lineStr -match "warning:|error:") {
              Write-Host $lineStr
              $ErrorCount++
            }
          }
        }

        Write-Host "`n--- Static Analysis Complete ---"
        Write-Host "Issues found: $ErrorCount"
        
        # Report-only mode — don't fail the CI build
        if ($ErrorCount -gt 0) {
          Write-Host "::warning::clang-tidy found $ErrorCount issues"
        }
        exit 0
